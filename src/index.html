<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>AngularCrud</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <script src="assets/in-app-browser-redirect.js"></script>
  <style>
    #in-app-browser-fallback {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 99999;
      background: rgba(0, 0, 0, 0.85);
      color: #fff;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    #in-app-browser-fallback h2 {
      margin: 0 0 12px;
      font-size: 1.25rem;
    }
    #in-app-browser-fallback p {
      margin: 0 0 24px;
      font-size: 0.95rem;
      line-height: 1.5;
      max-width: 320px;
      opacity: 0.9;
    }
    #in-app-browser-fallback button {
      background: #1877f2;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 14px 28px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div id="in-app-browser-fallback">
    <h2>Mở trong trình duyệt</h2>
    <p>Ứng dụng này cần mở trong Safari hoặc Chrome để hoạt động đúng. Nhấn nút bên dưới hoặc chọn "Mở trong trình duyệt" từ menu.</p>
    <button type="button" onclick="window.__openInNativeBrowser && window.__openInNativeBrowser()">
      Mở Safari / Chrome
    </button>
  </div>
  <app-root></app-root>
</body>
</html>
