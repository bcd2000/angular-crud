<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>AngularCrud</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <script>
    (function () {
      var ua = navigator.userAgent || '';
      var inApp = /FBAN|FBAV|FB_IAB|FBIOS|Instagram|Messenger/i.test(ua);
      if (inApp) document.documentElement.classList.add('in-app-browser');
      if (/Android/i.test(ua)) document.documentElement.classList.add('android');
    })();
  </script>
  <script src="assets/in-app-browser-redirect.js"></script>
  <style>
    html.in-app-browser app-root {
      display: none !important;
    }
    html.in-app-browser #in-app-browser-popup {
      display: flex !important;
    }
    #in-app-browser-popup {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 99999;
      background: rgba(0, 0, 0, 0.92);
      color: #fff;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    #in-app-browser-popup h2 {
      margin: 0 0 12px;
      font-size: 1.25rem;
    }
    #in-app-browser-popup p {
      margin: 0 0 24px;
      font-size: 0.95rem;
      line-height: 1.5;
      max-width: 320px;
      opacity: 0.9;
    }
    #open-native-browser-btn {
      background: #007aff;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 14px 28px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      min-width: 200px;
    }
    html.in-app-browser.android #open-native-browser-btn {
      background: #4285f4;
    }
  </style>
</head>
<body>
  <div id="in-app-browser-popup">
    <h2 id="in-app-fallback-title">Mở trong trình duyệt</h2>
    <p id="in-app-fallback-desc">
      Vui lòng mở link này trong trình duyệt bên ngoài để tiếp tục.
    </p>
    <button id="open-native-browser-btn" type="button">
      Mở trình duyệt
    </button>
  </div>
  <app-root></app-root>
</body>
</html>
